name: Deploy CV Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: sinasnp/cv-site
  VPS_USER: kali
  VPS_HOST: 147.93.127.162
  CONTAINER_NAME: cv-site-container
  PROJECT_PORT: 3000

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: 🔧 Build and Push Docker Image
        run: |
          docker build -t $IMAGE_NAME:latest .
          echo "image built"
          docker push $IMAGE_NAME:latest

      - name: 🔐 Setup SSH for VPS Access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CI_CD_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy on VPS
        run: |
          ssh $VPS_USER@$VPS_HOST << 'EOF'
            docker pull $IMAGE_NAME:latest
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true
            docker run -d --name $CONTAINER_NAME -p $PROJECT_PORT:3000 $IMAGE_NAME:latest
          EOF
